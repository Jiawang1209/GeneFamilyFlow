project_name: GeneFamilyFlow
output_dir: output
work_dir: work
log_dir: logs

species:
  - name: Athaliana
    pep_fasta: /path/to/Athaliana.pep.fasta
    cds_fasta: /path/to/Athaliana.cds.fasta
    gff3: /path/to/Athaliana.gff3
    genome_fasta: /path/to/Athaliana.fa
  - name: Osativa
    pep_fasta: /path/to/Osativa.pep.fasta
    cds_fasta: /path/to/Osativa.cds.fasta
    gff3: /path/to/Osativa.gff3
    genome_fasta: /path/to/Osativa.fa
  - name: Sbicolor
    pep_fasta: /path/to/Sbicolor.pep.fasta
    cds_fasta: /path/to/Sbicolor.cds.fasta
    gff3: /path/to/Sbicolor.gff3
    genome_fasta: /path/to/Sbicolor.fa

reference_species:
  name: Athaliana
  family_member_ids: /path/to/reference_family_ids.txt

pfam:
  pfam_id: PF00854
  hmm_file: null
  hmmscan_evalue: 1e-5
  hmmsearch_evalue: 1e-10

blast:
  evalue: 1e-10
  num_threads: 10
  num_alignments: 10

tree:
  aligner: muscle
  iqtree_model: MFP
  bootstrap: 1000

motif:
  nmotifs: 10
  minw: 10
  maxw: 50

promoter:
  upstream_length: 2000

tools:
  hmmsearch: hmmsearch
  hmmbuild: hmmbuild
  hmmscan: hmmscan
  blastp: blastp
  makeblastdb: makeblastdb
  seqkit: seqkit
  muscle: muscle
  iqtree: iqtree
  meme: meme
  Rscript: Rscript
