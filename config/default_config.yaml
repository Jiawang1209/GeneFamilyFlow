# GeneFamilyFlow Configuration
# This file defines all parameters for the automated gene family analysis pipeline

# ============================================================================
# GENERAL SETTINGS
# ============================================================================

# List of species to analyze (used by multiple steps)
species:
  - Sbicolor
  - Athaliana
  - Osativa

# Target species for single-species detailed analyses (Steps 6-10)
target_species: "Sbicolor"

# Map each species to the ID prefix used in sequence/gene identifiers.
# Used by steps 5/6/8 to assign species to gene IDs. If a species is not listed,
# falls back to the first two characters of the species name.
species_id_prefix:
  Sbicolor: "Sobic."
  Athaliana: "AT"
  Osativa: "LOC_Os"

# Data and output directories
database_dir: "example/1.database"        # Input: raw genome data
output_dir: "output"                      # Output: all analysis results
work_dir: "work"                          # Temporary: intermediate files
log_dir: "logs"                           # Logs: execution logs

# ============================================================================
# STEP 1: DATA PREPARATION AND QUALITY CONTROL
# ============================================================================

step1:
  # GFF3 filtering (optional, if subsetting needed)
  filter_gff3: false
  gff3_gene_ids: []  # Leave empty to keep all genes
  gff3_chromosomes: []  # Leave empty to keep all chromosomes

# ============================================================================
# STEP 2: HMM SEARCH (HMMER)
# ============================================================================

step2:
  # ---- Multi-domain support ----
  # Each entry defines one Pfam domain to search.
  # All domains are searched independently; hits are merged in Step 4.
  #
  # seed_references: list of reference species keys (see step3.reference_species)
  #   to pull BLAST seed sequences from. Omit to use all reference species.
  domains:
    - pfam_id: "PF00854"
      pfam_hmm_file: "example/2.hmmsearch/PF00854.hmm"
      seed_references:
        - Athaliana
    # Add more domains as needed:
    # - pfam_id: "PF00005"
    #   pfam_hmm_file: "path/to/PF00005.hmm"
    #   seed_references:
    #     - Athaliana
    #     - Osativa

  # E-value threshold for hmmsearch (shared across domains)
  hmmsearch_evalue: 1e-10

  # Clustering parameters for building custom HMM
  clustering_tool: "clustalw"  # or "muscle"
  clustering_params:
    type: "PROTEIN"
    output: "clustal"
    slow_accurate: true

  # Custom HMM building
  hmmbuild_calibrate: true

# ============================================================================
# STEP 3: BLAST SEARCH
# ============================================================================

step3:
  # Reference species used to build BLAST seed FASTA per Pfam domain.
  # For each reference, provide:
  #   domains_table: 2-column TSV (gene_id<TAB>pfam_id), one row per hit.
  #   proteome:      gene-level protein FASTA (first token after '>' = gene ID).
  # At runtime, scripts/extract_seed_by_pfam.py filters the table by the
  # target Pfam ID and extracts matching sequences into seed.fa.
  #
  # Large *.pep.fasta files are gitignored (user-provided). Small
  # *.sample.* fixtures are committed for tests.
  reference_species:
    Athaliana:
      domains_table: "example/3.blast/references/Athaliana.domains.tsv"
      proteome:      "example/3.blast/references/Athaliana.pep.fasta"
    Osativa:
      domains_table: "example/3.blast/references/Osativa.domains.tsv"
      proteome:      "example/3.blast/references/Osativa.pep.fasta"

  # BLAST parameters (shared across domains)
  blast_evalue: 1e-10
  blast_num_threads: 10
  blast_num_alignments: 10
  blast_outfmt: "6 std qlen slen"

# ============================================================================
# STEP 4: GENE FAMILY IDENTIFICATION
# ============================================================================

step4:
  # Method to merge HMM and BLAST results (per-domain, inside each domain)
  merge_method: "intersection"  # or "union"

  # Multi-domain combination strategy (across domains listed in step2.domains)
  #   "any" → gene kept if it has at least one target domain (union; default)
  #          Use for gene families with variable architecture (e.g. NLR: some
  #          members have only NB-ARC, others have NB-ARC + LRR + TIR).
  #   "all" → gene kept only if it has every target domain (intersection)
  #          Use for strict multi-domain families where architecture is conserved.
  # When only one domain is listed, both modes produce the same result.
  domain_combine: "any"

  # Pfam domain verification
  # When use_pfam_scan is false, step 4 skips pfam_scan.pl and relies on the
  # per-domain hmmsearch hits from step 2 (merged per `domain_combine` mode).
  # Useful when pfam_scan.pl is unavailable or when hmmsearch validation is
  # sufficient.
  use_hmmscan: true              # hmmscan (general scan)
  use_pfam_scan: false           # pfam_scan.pl (specific scan)

  # Pfam parameters
  pfam_scan_evalue: 1e-5
  pfam_scan_cpu: 30

  # Pfam database directory (required for pfam_scan.pl)
  pfam_database_dir: "/data/Liu/LiuYue/Evolution/Pfam"

# ============================================================================
# STEP 5: GENE FAMILY INFORMATION STATISTICS
# ============================================================================

step5:
  # Protein FASTA input is consumed automatically from Step 4's output:
  #   {output_dir}/04_identification/identify.ID.clean.fa
  #
  # Gene coordinate BED file (external, user-provided).
  # Columns: Chr Start End ID Info Strand
  # Also consumed by Step 9 (circos) and Step 10 (promoter extraction).
  gene_bed_file: "example/10.promoter/species_10.bed"

  # Output format
  output_formats:
    - xlsx
    - csv

  # R script
  r_script: "R/05_genefamily_info.R"

# ============================================================================
# STEP 6: PHYLOGENETIC TREE CONSTRUCTION
# ============================================================================

step6:
  # Multiple sequence alignment
  alignment_tool: "muscle"  # or "clustalw"
  alignment_threads: 8

  # Tree building tool: "iqtree" (accurate, slow) or "fasttree" (fast, approximate)
  tree_tool: "iqtree"

  # IQ-TREE parameters (used when tree_tool == "iqtree")
  iqtree_model: "MFP"        # Model selection (MFP = automatic)
  iqtree_bootstrap: 1000     # Bootstrap replicates
  iqtree_seed: 12345         # Random seed for reproducibility
  iqtree_threads: 8

  # FastTree parameters (used when tree_tool == "fasttree")
  fasttree_options: "-gamma"  # Additional FastTree flags (e.g. "-gamma -wag")

  # Visualization
  tree_figure_width: 15      # inches
  tree_figure_height: 15     # inches

  # Auto-split tips into N monophyletic subfamilies when no manual group_file
  # is provided. Uses top-down recursive clade splitting (guarantees monophyly).
  # Set 0 to disable. A manual `group_file` (xlsx with label/Group/rename
  # columns) overrides auto-splitting for fine-grained curation.
  auto_n_subfamilies: 8
  auto_subfamily_prefix: "Sub"

  # Tree layout(s) to render: "circular", "rectangular", or "both" (default).
  tree_layout: "both"

  # R script
  r_script: "R/06_tree.R"

# ============================================================================
# STEP 7: MOTIF AND GENE STRUCTURE ANALYSIS
# ============================================================================

step7:
  # MEME motif discovery
  meme_tool: "meme"
  meme_mod: "anr"              # Mode: anr (any number of repetitions)
  meme_protein: true           # Protein sequences (not DNA)
  meme_nmotifs: 10             # Number of motifs to discover
  meme_minw: 10                # Minimum motif width
  meme_maxw: 50                # Maximum motif width

  # MEME output parser
  python_parser: "scripts/parse_meme_output.py"
  species_prefix: "Sobic."     # Gene ID prefix for target species

  # Visualization
  r_script: "R/07_domain_motif_structure.R"
  figure_width: 22.5           # inches
  figure_height: 20            # inches

# ============================================================================
# STEP 8: JCVI SYNTENY ANALYSIS AND Ka/Ks
# ============================================================================

step8:
  # Set to false to run JCVI synteny + Ka/Ks from scratch
  # Requires: {database_dir}/{species}.gff3 and {species}.cds.fasta
  precomputed: true

  # JCVI ortholog calling
  jcvi_database_type: "prot"
  jcvi_evalue: 1e-10
  jcvi_no_strip_names: true

  # JCVI synteny visualization
  synteny_minspan: 30          # Minimum anchor distance
  synteny_simple: true

  # Ka/Ks calculation
  kaks_calculator: "KaKs_Calculator"  # or other tools
  kaks_file: "example/8.collinearity/kaks.tab.xls"  # used when precomputed: true

  # Visualization
  r_script: "R/08_jcvi_kaks.R"
  figure_width: 7.5            # inches
  figure_height: 16            # inches

# ============================================================================
# STEP 9: MCSCANX SYNTENY AND CIRCOS
# ============================================================================

step9:
  # Set to false to run MCScanX from scratch
  # Requires: {database_dir}/{species}.gff3
  precomputed: true

  # MCScanX parameters
  mcscanx_path: "~/software/MCScanX/MCScanX"
  duplicate_classifier_path: "~/software/MCScanX/duplicate_gene_classifier"

  # Ka/Ks calculation (similar to Step 8)
  kaks_calculator: "KaKs_Calculator"

  # Circos visualization
  r_script: "R/09_circos.R"
  figure_width: 8              # inches
  figure_height: 8             # inches
  circos_chr_style: "roundrect"  # Chromosome style

  # Species-specific parameters
  species_config:
    Sbicolor:
      n_chromosomes: 10
      genome_length_file: "example/9.mcscanx/Sbicolor_454_v3.0.1.fa.fai"
      npf_id_file: "example/9.mcscanx/Sbicolor.NPF.id"
    Athaliana:
      n_chromosomes: 5
      genome_length_file: "example/9.mcscanx/Athaliana_167_TAIR10.fa.fai"
      npf_id_file: "example/9.mcscanx/AT.NPF.id"
    Osativa:
      n_chromosomes: 12
      genome_length_file: "example/9.mcscanx/Osativa_323_v7.0.fa.fai"
      npf_id_file: "example/9.mcscanx/Os.NPF.id"

# ============================================================================
# STEP 10: PROMOTER ANALYSIS
# ============================================================================

step10:
  # Set to true to extract promoter sequences from genome (requires bedtools)
  # Requires: {database_dir}/{target_species}.genome.fasta
  compute_promoter: false

  # Promoter extraction
  upstream_distance: 2000      # bp upstream of TSS

  # Cis-element prediction (PlantCARE — online submission, download results)
  plantcare_dir: "example/10.promoter/PlantCARE_410_SB_plantCARE"

  # Cis-element annotation database
  element_annotation_file: "example/10.promoter/cir_element.desc.20240509.xlsx"

  # Visualization
  r_script: "R/10_promoter.R"
  figure_width: 25             # inches
  figure_height: 22            # inches

# ============================================================================
# STEP 11: PROTEIN-PROTEIN INTERACTION (PPI)
# ============================================================================

step11:
  # Reference PPI database (AraNet for Arabidopsis)
  ppi_database_file: "example/11.ppi/AraNet.txt"

  # Cross-species ortholog mapping (BLAST)
  blast_evalue: 1e-10
  blast_num_threads: 10

  # Pfam annotation for PPI nodes
  pfam_scan_evalue: 1e-5

  # PPI edge file (pre-computed or from ortholog mapping)
  ppi_edge_file: "example/11.ppi/edge_annotation.xlsx"

  # Network visualization
  r_script: "R/11_ppi.R"
  figure_width: 10             # inches
  figure_height: 10.5          # inches
  igraph_layout: "gephi"       # or "fr", "circle", "kk"

# ============================================================================
# OPTIONAL STEPS: GO/KEGG, qRT-PCR
# ============================================================================

step13_go_kegg:
  enabled: false
  annotation_file: "example/13.GO_KEGG/annotations.tsv"
  r_script: "R/13_go_kegg.R"

step14_qrtpcr:
  enabled: false
  expression_data: "example/14.qRT_PCR/qrt_pcr_data.xlsx"
  r_script: "R/14_qrt_pcr.R"

# ============================================================================
# PARALLEL EXECUTION
# ============================================================================

# Maximum number of threads for parallel jobs
max_threads: 8

# Number of Snakemake jobs to run in parallel
snakemake_jobs: 8

# ============================================================================
# CONDA ENVIRONMENT
# ============================================================================

# Use Conda for environment isolation
use_conda: true
conda_env: "envs/genefamily.yaml"

# ============================================================================
# TEMPORARY AND OUTPUT FILE CLEANUP
# ============================================================================

# Keep intermediate files (set to false to save disk space)
keep_intermediate: true

# Compress large intermediate files
compress_intermediate: false

# Archive old results
archive_old_results: false
archive_days: 30  # Archive results older than 30 days
