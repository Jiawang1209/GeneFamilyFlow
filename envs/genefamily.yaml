name: GeneFamilyFlow
channels:
  - bioconda
  - conda-forge
  - defaults

dependencies:
  # ---- Python & Snakemake ----
  - python=3.11
  - snakemake>=8.0
  - pyyaml
  - jsonschema>=4.0
  - pip

  # ---- R core ----
  - r-base>=4.3
  - r-tidyverse
  - r-optparse
  - r-ggplot2
  - r-readxl
  - r-writexl
  - r-data.table
  - r-rlang

  # ---- R: tree & alignment visualization ----
  - bioconductor-ggtree
  - bioconductor-treeio
  - r-tidytree
  - r-aplot
  - r-ggnewscale
  - r-gggenes
  - r-ggfun
  - r-patchwork

  # ---- R: statistics & specialized plots ----
  - r-ggbeeswarm
  - r-ggpubr
  - r-ggsignif
  - r-ggprism
  - r-ggalluvial
  - r-ggh4x
  - r-rcolorbrewer
  - r-pheatmap
  - bioconductor-complexheatmap
  - r-showtext
  - r-agricolae

  # ---- R: network & circos ----
  - r-igraph
  - r-ggraph
  - r-tidygraph
  - r-circlize
  - r-legendry

  # ---- R: bioinformatics ----
  - bioconductor-biostrings
  - r-peptides

  # ---- Sequence analysis tools ----
  - hmmer>=3.3
  - blast>=2.13
  - muscle>=5.1
  - clustalw
  - seqkit>=2.3

  # ---- Phylogenetics ----
  - iqtree>=2.2
  - fasttree>=2.1

  # ---- Motif discovery ----
  - meme>=5.5

  # ---- Synteny ----
  - jcvi>=1.3

  # ---- Pfam domain annotation ----
  - pfam_scan

  # ---- Promoter extraction ----
  - bedtools>=2.30

  # ---- Python testing ----
  - pytest>=7.0
  - pip:
    - pytest-cov>=4.0

# R packages requiring manual installation (not in conda):
#   - ggNetView: install.packages("ggNetView") or devtools::install_github(...)
#     Used by R/11_ppi.R for PPI network visualization
#
# Tools requiring manual installation (not in conda):
#   - MCScanX:          https://github.com/wyp1125/MCScanX (compile from source)
#   - KaKs_Calculator:  https://sourceforge.net/projects/kakscalculator2/
#   - PlantCARE:        https://bioinformatics.psb.ugent.be/webtools/plantcare/html/
#
# Installation:
#   conda env create -f envs/genefamily.yaml
#   conda activate GeneFamilyFlow
